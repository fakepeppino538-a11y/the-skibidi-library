<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Library</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #1f2937;
    }

    header {
      padding: 24px 16px;
      text-align: center;
      background: white;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .book {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .book:hover {
      transform: translateY(-2px);
    }

    .cover {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      display: block;
      background: #e5e7eb;
    }

    .book-info {
      padding: 12px;
    }

    .book-info h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .book-info p {
      margin: 0;
      font-size: 13px;
      color: #6b7280;
    }

    .viewer {
      margin-top: 28px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      overflow: hidden;
      min-height: 500px;
      display: none;
    }

    .viewer-header {
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .viewer-header a {
      color: #2563eb;
      text-decoration: none;
      font-size: 14px;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <h1>The Skibidi Library</h1>
    <p>Click a book cover or title to open the PDF</p>
  </header>

  <div class="container">
    <div class="grid" id="bookGrid"></div>

    <div class="viewer" id="viewerBox">
      <div class="viewer-header">
        <strong id="viewerTitle">Book Viewer</strong>
        <a id="openPdf" href="#" target="_blank" rel="noopener">Open in new tab</a>
      </div>
      <iframe id="pdfFrame" title="PDF Viewer"></iframe>
    </div>
  </div>

  <script src="books.js"></script>
  <script>
    const grid = document.getElementById("bookGrid");
    const viewerBox = document.getElementById("viewerBox");
    const viewerTitle = document.getElementById("viewerTitle");
    const pdfFrame = document.getElementById("pdfFrame");
    const openPdf = document.getElementById("openPdf");

    function openBook(book) {
      viewerTitle.textContent = book.title;
      pdfFrame.src = book.pdf;
      openPdf.href = book.pdf;
      viewerBox.style.display = "block";
      viewerBox.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    books.forEach((book) => {
      const card = document.createElement("div");
      card.className = "book";
      card.innerHTML = `
        <img class="cover" src="${book.cover}" alt="${book.title} cover" loading="lazy">
        <div class="book-info">
          <h3>${book.title}</h3>
          <p>Click to read</p>
        </div>
      `;
      card.addEventListener("click", () => openBook(book));
      grid.appendChild(card);
    });
  </script>
</body>
</html>
